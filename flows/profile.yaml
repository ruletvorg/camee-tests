# Flow: Profile Screen Test
# Description: Test user profile screen navigation and elements

appId: com.rulettv.app

---
- launchApp
- waitForAppToIdle: 2000

# Navigate to Profile tab
- tapOn:
    id: "profile"
- waitForAppToIdle: 2000

- takeScreenshot: { name: "profile_screen" }

# Scroll down to see more profile info
- scrollUntilVisible:
    element:
      text: "Settings"
- takeScreenshot: { name: "profile_scrolled" }

# Open settings
- tapOn:
    text: "Settings"
- waitForAppToIdle: 2000

- takeScreenshot: { name: "settings_screen" }

# Go back
- tapOn:
    id: "back"
- waitForAppToIdle: 1000
