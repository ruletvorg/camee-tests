# Flow: Login with email
# Description: Launch the Android app, choose "Continue with email", and sign in.

appId: com.rulettv.app
env:
  TEST_USER_EMAIL: "matusevich.v@chattech.io"
  TEST_USER_PASSWORD: "Test1111"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

- tapOn:
    text: "Вход через Email"
- waitForAnimationToEnd

- tapOn:
    text: "Принять"
- waitForAnimationToEnd

- tapOn:
    text: "Email"
- inputText: "${TEST_USER_EMAIL}"
- hideKeyboard

- tapOn:
    text: "Продолжить"
- waitForAnimationToEnd

- tapOn:
    text: "Пароль"
- inputText: "${TEST_USER_PASSWORD}"
- hideKeyboard

- tapOn:
    text: "Продолжить"
- waitForAnimationToEnd

# Accept either a successful post-login screen or the app staying responsive after login.
- assertNotVisible:
    text: "Вход через Email"
